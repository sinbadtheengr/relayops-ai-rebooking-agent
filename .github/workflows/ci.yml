name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci compiles the better-sqlite3 native addon; prebuilt binaries are
      # used when available on Node 20 / ubuntu-latest.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck / build
        run: npm run build

      - name: Test
        run: npm test
